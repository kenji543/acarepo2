{# Usage: {% include "portfolio/includes/form_field.html" with field=form.title %} #}
<div class="{% if full_width %}md:col-span-2{% endif %}">
    <label for="{{ field.id_for_label }}" class="mb-1.5 block text-sm font-medium text-slate-700">
        {{ field.label }}
        {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
    <p class="mt-1.5 text-xs text-slate-500">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
    <p class="mt-1.5 text-sm text-red-600">{{ field.errors|join:", " }}</p>
    {% endif %}
</div>
